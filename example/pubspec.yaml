name: flutter_callkit_incoming_example
description: Demonstrates how to use the flutter_callkit_incoming plugin.

publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_callkit_incoming:
    path: ../

  firebase_core: 4.4.0
  firebase_messaging: 16.1.1
  http: 1.6.0
  uuid: 4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/test.png
